<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DTX The Circle — Walk Polls</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #15151a;
    --ink-soft: #1e1e26;
    --ivory: #f6f2ec;
    --muted: #a6a3ad;
    --gold: #cda45e;
    --line: rgba(246,242,236,0.14);
    --glass: rgba(246,242,236,0.05);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--ink);
    background-image:
      radial-gradient(circle at 15% 10%, rgba(205,164,94,0.10), transparent 45%),
      radial-gradient(circle at 85% 90%, rgba(205,164,94,0.07), transparent 45%);
    color: var(--ivory);
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 56px;
    -webkit-font-smoothing: antialiased;
  }

  /* Signature: rotating monogram seal with a thin rainbow ring */
  .seal {
    width: 58px; height: 58px;
    border-radius: 50%;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 18px;
    background: var(--ink-soft);
  }
  .seal::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    padding: 3px;
    background: conic-gradient(from 0deg, #e0577b, #e8a34e, #e3d15a, #6fbf8c, #4f9bd6, #9b6fd6, #e0577b);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    animation: seal-spin 10s linear infinite;
  }
  @keyframes seal-spin { to { transform: rotate(360deg); } }
  .seal span {
    font-family: 'Fraunces', serif;
    font-size: 15px;
    letter-spacing: 1px;
    color: var(--gold);
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 22px;
    letter-spacing: 0.2px;
    margin: 0 0 30px;
    text-align: center;
    color: var(--ivory);
  }

  .content { position: relative; width: 100%; max-width: 400px; }

  .card {
    background: var(--glass);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 34px 26px 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    position: relative;
    overflow: hidden;
  }

  /* ambient floating theme emoji — subtle, tucked behind content */
  .ambient-emoji {
    position: absolute;
    font-size: 26px;
    opacity: 0.14;
    z-index: 0;
    animation: drift 6s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes drift {
    0%, 100% { transform: translateY(0) rotate(-6deg); }
    50% { transform: translateY(-14px) rotate(6deg); }
  }

  .card > * { position: relative; z-index: 1; }

  button.vote-btn .btn-emoji {
    display: inline-block;
    margin-right: 10px;
    font-size: 18px;
    animation: wiggle 2.4s ease-in-out infinite;
  }
  @keyframes wiggle {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-8deg); }
    75% { transform: rotate(8deg); }
  }

  /* thin rainbow thread across the top of the card — the one bold accent */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #ff3cac, #ff7a3c, #ffd93d, #4fd67a, #4f9bd6, #a45fe8);
  }

  .question-label {
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
    text-align: center;
  }

  .question {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 500;
    line-height: 1.25;
    text-align: center;
    margin-bottom: 28px;
    color: var(--ivory);
  }

  .options { display: flex; flex-direction: column; gap: 12px; margin-bottom: 6px; }

  button.vote-btn {
    position: relative;
    border: none;
    border-radius: 14px;
    padding: 17px 18px;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #16161a;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.2s ease;
    text-align: left;
    letter-spacing: 0.2px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.25);
  }
  button.vote-btn:active { transform: scale(0.97); }
  button.vote-btn:hover { box-shadow: 0 8px 22px rgba(0,0,0,0.35); transform: translateY(-1px); }
  button.vote-btn.opt-1 { background: linear-gradient(120deg, #ff7ab8, #ffb347); }
  button.vote-btn.opt-2 { background: linear-gradient(120deg, #4fd6c0, #4f9bd6); }
  button.vote-btn .arrow { float: right; opacity: 0.6; color: #16161a; }

  .results { margin-top: 24px; }
  .bar-row { margin-bottom: 18px; }
  .bar-label {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    color: var(--ivory);
  }
  .bar-label .pct { font-family: 'Fraunces', serif; font-size: 15px; color: var(--gold); }
  .bar-track {
    background: rgba(246,242,236,0.08);
    border-radius: 999px;
    height: 6px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 999px;
    transition: width 0.7s cubic-bezier(.4,0,.2,1);
    background: linear-gradient(90deg, #ff3cac, #ff7a3c, #ffd93d, #4fd67a, #4f9bd6);
  }

  .voted-note {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 4px;
    letter-spacing: 0.2px;
  }
  .total-note {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 16px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .switch-btn {
    display: block;
    margin: 22px auto 0;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--muted);
    padding: 9px 18px;
    border-radius: 999px;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }
  .switch-btn:hover { color: var(--gold); border-color: var(--gold); }

  .footer-note {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    margin-top: 22px;
    font-style: italic;
    font-family: 'Fraunces', serif;
  }

  /* signature moment: rising gold sparks on vote, not confetti clutter */
  .spark {
    position: fixed;
    bottom: -10px;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--gold);
    z-index: 5;
    animation: rise linear forwards;
    box-shadow: 0 0 6px 1px rgba(205,164,94,0.6);
  }
  .spark-emoji {
    width: auto; height: auto;
    background: none;
    box-shadow: none;
    font-size: 20px;
    line-height: 1;
  }
  @keyframes rise {
    to { transform: translateY(-100vh) translateX(var(--drift, 0px)); opacity: 0; }
  }

  .card.pulse { animation: cardPulse 0.6s ease; }
  @keyframes cardPulse {
    0% { box-shadow: 0 20px 60px rgba(0,0,0,0.35); }
    40% { box-shadow: 0 20px 60px rgba(205,164,94,0.25), 0 0 0 1px rgba(205,164,94,0.3); }
    100% { box-shadow: 0 20px 60px rgba(0,0,0,0.35); }
  }
</style>
</head>
<body>

<div class="seal"><span>DTX</span></div>
<div class="eyebrow">The Circle</div>
<h1 id="main-label">Warm-Up Question</h1>

<div class="content">
  <div id="poll-container" class="card"></div>
  <div class="footer-note" id="footer-note"></div>
</div>

<script>
const POLLS = {
  pineapple: {
    key: "poll:pineapple-pizza",
    label: "Warm-Up Question",
    question: "Pineapple on pizza —\nyes or never?",
    optA: { label: "Yes, it's iconic", emoji: "🍍" },
    optB: { label: "Never. Not once.", emoji: "🍕" },
    ambient: ["🍍","🍕","🍍","🍕","🍍"],
    glow: "rgba(232,163,78,0.16)"
  },
  mountainbeach: {
    key: "poll:mountain-beach",
    label: "Main Event",
    question: "Mountains\nor beach?",
    optA: { label: "Mountains", emoji: "⛰️" },
    optB: { label: "Beach", emoji: "🌊" },
    ambient: ["⛰️","🌊","🌴","⛰️","🌊"],
    glow: "rgba(79,155,214,0.16)"
  }
};

const AMBIENT_POS = [
  { top: '8%', left: '6%' },
  { top: '14%', right: '10%' },
  { top: '62%', left: '4%' },
  { top: '70%', right: '8%' },
  { top: '40%', left: '82%' }
];

let currentPoll = localStorage.getItem('circle_current_poll') || 'pineapple';

function launchSparks(themeEmojis) {
  for (let i = 0; i < 18; i++) {
    const spark = document.createElement('div');
    const useEmoji = themeEmojis && Math.random() > 0.4;
    spark.className = 'spark' + (useEmoji ? ' spark-emoji' : '');
    if (useEmoji) {
      spark.textContent = themeEmojis[Math.floor(Math.random() * themeEmojis.length)];
    }
    const startX = 25 + Math.random() * 50;
    spark.style.left = startX + 'vw';
    spark.style.setProperty('--drift', (Math.random() * 90 - 45) + 'px');
    spark.style.animationDuration = (1.8 + Math.random() * 1.3) + 's';
    document.body.appendChild(spark);
    setTimeout(() => spark.remove(), 3300);
  }
}

async function getCounts(key) {
  try {
    const res = await window.storage.get(key, true);
    return res ? JSON.parse(res.value) : { a: 0, b: 0 };
  } catch (e) {
    return { a: 0, b: 0 };
  }
}

async function vote(pollId, choice) {
  const poll = POLLS[pollId];
  const counts = await getCounts(poll.key);
  counts[choice] = (counts[choice] || 0) + 1;
  await window.storage.set(poll.key, JSON.stringify(counts), true);
  localStorage.setItem('circle_voted_' + pollId, choice);
  launchSparks(poll.ambient);
  const card = document.getElementById('poll-container');
  card.classList.add('pulse');
  setTimeout(() => card.classList.remove('pulse'), 650);
  render();
}

async function render() {
  const poll = POLLS[currentPoll];
  const counts = await getCounts(poll.key);
  const total = (counts.a || 0) + (counts.b || 0);
  const pctA = total ? Math.round((counts.a / total) * 100) : 0;
  const pctB = total ? Math.round((counts.b / total) * 100) : 0;
  const votedChoice = localStorage.getItem('circle_voted_' + currentPoll);
  const container = document.getElementById('poll-container');

  let optionsHtml = '';
  if (!votedChoice) {
    optionsHtml = `
      <div class="options">
        <button class="vote-btn opt-1" onclick="vote('${currentPoll}','a')"><span class="btn-emoji">${poll.optA.emoji}</span>${poll.optA.label}<span class="arrow">→</span></button>
        <button class="vote-btn opt-2" onclick="vote('${currentPoll}','b')"><span class="btn-emoji" style="animation-delay:0.4s">${poll.optB.emoji}</span>${poll.optB.label}<span class="arrow">→</span></button>
      </div>
    `;
  } else {
    optionsHtml = `<div class="voted-note">Thank you for weighing in — here's where the circle stands</div>`;
  }

  const ambientHtml = poll.ambient.map((e, i) => {
    const pos = AMBIENT_POS[i % AMBIENT_POS.length];
    const posStyle = Object.entries(pos).map(([k,v]) => `${k}:${v}`).join(';');
    return `<span class="ambient-emoji" style="${posStyle};animation-delay:${i * 0.7}s">${e}</span>`;
  }).join('');

  container.style.background = `radial-gradient(circle at 20% 0%, ${poll.glow}, transparent 60%), var(--glass)`;
  document.getElementById('main-label').textContent = poll.label;

  container.innerHTML = `
    ${ambientHtml}
    <div class="question">${poll.question.replace('\n','<br>')}</div>
    ${optionsHtml}
    <div class="results">
      <div class="bar-row">
        <div class="bar-label"><span>${poll.optA.emoji} ${poll.optA.label}</span><span class="pct">${pctA}%</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${pctA}%"></div></div>
      </div>
      <div class="bar-row">
        <div class="bar-label"><span>${poll.optB.emoji} ${poll.optB.label}</span><span class="pct">${pctB}%</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${pctB}%"></div></div>
      </div>
      <div class="total-note">${total} vote${total===1?'':'s'} cast</div>
    </div>
  `;

  document.getElementById('footer-note').innerHTML = `"Grateful for this circle, every step of the way."`;
}

function switchPoll() {
  currentPoll = currentPoll === 'pineapple' ? 'mountainbeach' : 'pineapple';
  localStorage.setItem('circle_current_poll', currentPoll);
  render();
}

window.addEventListener('load', () => {
  render();
  const switchBtn = document.createElement('button');
  switchBtn.className = 'switch-btn';
  switchBtn.textContent = 'Organizer — switch question';
  switchBtn.onclick = switchPoll;
  document.querySelector('.content').appendChild(switchBtn);
  setInterval(render, 4000);
});
</script>
</body>
</html>
